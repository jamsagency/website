<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
.grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; padding: 20px 24px 8px; }
.chip { aspect-ratio: 1; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.04); }
.labels { display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; padding: 0 24px 20px; }
.labels span { font-family:"Geist Mono", monospace; font-size:10px; color:#737373; text-align:center; }
h3 { margin: 20px 24px 0; font-family:"Geist", sans-serif; font-size:12px; color:#A0A0A3; letter-spacing:0.08em; text-transform:uppercase; font-weight:500;}
</style></head>
<body>
<div class="card">
  <h3>Secondary · orange</h3>
  <div class="grid">
    <div class="chip" style="background:#FFF7ED"></div>
    <div class="chip" style="background:#FFEDD5"></div>
    <div class="chip" style="background:#FED7AA"></div>
    <div class="chip" style="background:#FDBA74"></div>
    <div class="chip" style="background:#FB923C"></div>
    <div class="chip" style="background:#F97316; outline:2px solid #000; outline-offset:-4px; outline-style:dashed;"></div>
    <div class="chip" style="background:#EA580C"></div>
    <div class="chip" style="background:#C2410C"></div>
    <div class="chip" style="background:#9A3412"></div>
    <div class="chip" style="background:#7C2D12"></div>
    <div class="chip" style="background:#431407"></div>
  </div>
  <div class="labels">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span><b>500</b></span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span>
  </div>
</div>
</body></html>
