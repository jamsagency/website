<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
.card { padding: 24px; }
.row { display:flex; align-items:center; gap:14px; padding: 6px 0; }
.bar { background:#8B5CF6; height: 10px; border-radius: 2px;}
.lbl { font-family:"Geist Mono", monospace; font-size:11px; color:#404040; width:54px;}
.name { font-family:"Geist", sans-serif; font-size:11px; color:#737373; width:120px;}
</style></head>
<body>
<div class="card">
  <div class="row"><span class="lbl">4px</span><span class="name">space-1 · hairline gap</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl">8px</span><span class="name">space-2 · icon+label</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">12px</span><span class="name">space-3 · inline stacks</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="lbl">16px</span><span class="name">space-4 · default gap</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">24px</span><span class="name">space-6 · card padding</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">32px</span><span class="name">space-8 · button padding-x</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="lbl">64px</span><span class="name">space-16 · section title gap</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="lbl">100px</span><span class="name">space-24 · section padding</span><div class="bar" style="width:100px"></div></div>
</div>
</body></html>
