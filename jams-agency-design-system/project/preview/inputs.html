<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
.card { padding: 26px 28px; display:flex; flex-direction:column; gap:12px; max-width:500px; }
.lbl { font-family:"Geist", sans-serif; font-size:12px; color:#171717; font-weight:500; padding-bottom:4px;}
.input { width:100%; padding: 12px 14px; border-radius: 12px; border: 1px solid #E3E3E5;
  background:#fff; font-family:"Neue Haas Grotesk Display Pro", sans-serif; font-size:14px; color:#171717;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.input::placeholder { color:#A0A0A3;}
.input:focus { outline: 2px solid rgba(139,92,246,0.35); outline-offset:1px; border-color:#8B5CF6;}
.help { font-family:"Geist", sans-serif; font-size:11px; color:#737373; }
.helpvio { color:#8B5CF6; font-weight:500;}
.err { border-color:#EF4444;}
.erralert { color:#DC2626; font-family:"Geist", sans-serif; font-size:11px;}
</style></head>
<body>
<div class="card">
  <div><div class="lbl">Your email</div><input class="input" placeholder="founder@company.com"></div>
  <div><div class="lbl">What's your business about?</div><input class="input" value="We're an EdTech platform for non-traditional learners."></div>
  <div><div class="lbl">Budget</div><input class="input err" value="$"><div class="erralert">Pick a range from the list.</div></div>
</div>
</body></html>
