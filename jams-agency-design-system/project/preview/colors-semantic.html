<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
.card { padding: 22px 24px; }
.row { display:grid; grid-template-columns: 110px 1fr; align-items:center; gap:16px; padding: 8px 0; border-bottom:0.5px solid #E3E3E5; }
.row:last-child { border:none; }
.row .name { font-family:"Geist", sans-serif; font-size:12px; font-weight:500; color:#171717;}
.swatches { display:flex; gap:6px; }
.chip { width:34px; height:34px; border-radius:8px; border: 0.5px solid rgba(0,0,0,0.04); position:relative; }
.chip::after { content: attr(data-hex); position:absolute; top:100%; left:0; font-family:"Geist Mono",monospace; font-size:9px; color:#737373; padding-top:2px; white-space:nowrap;}
</style></head>
<body>
<div class="card">
  <div class="row"><div class="name">Blue · info</div><div class="swatches">
    <div class="chip" style="background:#DBEAFE" data-hex="100"></div>
    <div class="chip" style="background:#93C5FD" data-hex="300"></div>
    <div class="chip" style="background:#3B82F6" data-hex="500"></div>
    <div class="chip" style="background:#1D4ED8" data-hex="700"></div>
  </div></div>
  <div class="row"><div class="name">Red · destructive</div><div class="swatches">
    <div class="chip" style="background:#FFE2E2" data-hex="200"></div>
    <div class="chip" style="background:#F87171" data-hex="400"></div>
    <div class="chip" style="background:#EF4444" data-hex="500"></div>
    <div class="chip" style="background:#DC2626" data-hex="600"></div>
  </div></div>
  <div class="row"><div class="name">Green · success</div><div class="swatches">
    <div class="chip" style="background:#BBF7D0" data-hex="200"></div>
    <div class="chip" style="background:#4ADE80" data-hex="400"></div>
    <div class="chip" style="background:#22C55E" data-hex="500"></div>
    <div class="chip" style="background:#15803D" data-hex="700"></div>
  </div></div>
</div>
</body></html>
