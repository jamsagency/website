<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_preview.css">
<style>
.grid { display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; padding: 20px 24px 8px; }
.chip { aspect-ratio: 1; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.08); }
.labels { display:grid; grid-template-columns: repeat(11, 1fr); gap:6px; padding: 0 24px 20px; }
.labels span { font-family:"Geist Mono", monospace; font-size:10px; color:#737373; text-align:center; }
h3 { margin: 20px 24px 0; font-family:"Geist", sans-serif; font-size:12px; color:#A0A0A3; letter-spacing:0.08em; text-transform:uppercase; font-weight:500;}
</style></head>
<body>
<div class="card">
  <h3>Neutrals · grayscale workhorse</h3>
  <div class="grid">
    <div class="chip" style="background:#FAFAFA"></div>
    <div class="chip" style="background:#F3F3F5"></div>
    <div class="chip" style="background:#E5E5E5"></div>
    <div class="chip" style="background:#D4D4D4"></div>
    <div class="chip" style="background:#A0A0A3"></div>
    <div class="chip" style="background:#737373"></div>
    <div class="chip" style="background:#525252"></div>
    <div class="chip" style="background:#404040; outline:2px solid #fff; outline-offset:-4px; outline-style:dashed;"></div>
    <div class="chip" style="background:#262626"></div>
    <div class="chip" style="background:#171717"></div>
    <div class="chip" style="background:#0B0B0B"></div>
  </div>
  <div class="labels">
    <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span><b>700</b></span><span>800</span><span>900</span><span>950</span>
  </div>
</div>
</body></html>
